name: Build and deploy Node.js app to Azure Web App - customized-tailor-platform-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Prepare standalone app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force deploy | Out-Null
          Copy-Item -Recurse -Force .next/standalone/* deploy/
          New-Item -ItemType Directory -Force deploy/.next | Out-Null
          Copy-Item -Recurse -Force .next/static deploy/.next/static
          if (Test-Path public) { Copy-Item -Recurse -Force public deploy/public }
          if (Test-Path prisma) { Copy-Item -Recurse -Force prisma deploy/prisma }

      - name: Package deployment artifact
        shell: pwsh
        run: |
          if (Test-Path deploy.zip) { Remove-Item deploy.zip }
          Compress-Archive -Path deploy/* -DestinationPath deploy.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deployed-app

      - name: Inspect deployment artifact
        run: |
          pwd
          ls -la deployed-app
          if [ -f deployed-app/deploy.zip ]; then
            unzip -l deployed-app/deploy.zip | head -50
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_219587AA2D924870AA8D5B4803837B5C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2095FF3E020640D88D51F143D5232F02 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5E08BF1D903844D6B49AD921A61D9D55 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: customized-tailor-platform-app
          slot-name: Production
          package: deployed-app/deploy.zip
